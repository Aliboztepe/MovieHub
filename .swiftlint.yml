# SwiftLint Configuration

disabled_rules:
  - trailing_whitespace
  
opt_in_rules:
  - empty_count
  - closure_spacing
  
excluded:
  - Pods
  - MovieHubTests
  - MovieHubUITests
  - .build
  
line_length: 150

identifier_name:
  min_length: 2
  max_length: 50

type_name:
  min_length: 3
  max_length: 40

function_body_length:
  warning: 50
  error: 100

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500
